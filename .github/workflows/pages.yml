name: Deploy Crypto Signal Dashboard to GitHub Pages

on:
  # Run on every push to the main branch
  push:
    branches: [main, master]

  # Run on a schedule: every 30 minutes
  schedule:
    - cron: '*/30 * * * *'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# ── Required permissions for GitHub Pages deployment ──────────────────────────
permissions:
  contents: read
  pages: write
  id-token: write

# Ensure only one deployment runs at a time; cancel in-progress ones on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Job 1: Run the bot and generate signals.json ────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate signals JSON
        run: |
          python -m crypto_signal_bot.main --export-json docs/signals.json
        env:
          # Data source – no API key required for basic usage
          DATA_SOURCE: cryptocompare
          PAIRS: BTC/USDT,ETH/USDT,SOL/USDT
          TIMEFRAMES: 1h,4h
          CANDLE_LIMIT: '200'
          LOG_LEVEL: INFO

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  # ── Job 2: Deploy the uploaded artifact to GitHub Pages ─────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
